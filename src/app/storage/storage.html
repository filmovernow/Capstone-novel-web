<div class="bg-[#0C134F] text-[#D4ADFC] min-h-screen font-sans">

  <app-navbar (searchEvent)="onNavbarSearch($event)"></app-navbar>

  <div class="pt-20">
    <div class="max-w-7xl mx-auto px-6 pb-16">

      <div class="mb-10">
        <p class="text-[#7B6FA0] text-sm mb-1">คลังของฉัน</p>
        <h1 class="text-3xl font-semibold text-white">📦 คลังเก็บนิยาย</h1>
      </div>

      <!-- TABS -->
      <div class="flex gap-2 mb-8 flex-wrap border-b border-[#5C469C]/30 pb-4">
        <button *ngFor="let tab of tabs"
          (click)="selectedTab = tab.key"
          [class]="selectedTab === tab.key
            ? 'flex items-center gap-2 bg-[#5C469C] text-white text-sm px-5 py-2 rounded-full transition-colors'
            : 'flex items-center gap-2 text-[#9B8CC4] text-sm px-5 py-2 rounded-full hover:bg-[#5C469C]/30 hover:text-white transition-colors'">
          {{tab.icon}} {{tab.label}}
          <span class="text-[10px] bg-[#0C134F]/60 px-2 py-0.5 rounded-full">{{tab.count}}</span>
        </button>
      </div>

      <!-- LOADING -->
      <div *ngIf="loading" class="flex justify-center py-20">
        <div class="text-[#7B6FA0]">กำลังโหลด...</div>
      </div>

      <!-- BOOK GRID -->
      <div *ngIf="!loading" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
        <div *ngFor="let item of filteredItems" 
             [routerLink]="['/read', item.novelId]"
             class="bg-[#1D267D]/60 border border-[#5C469C]/30 rounded-2xl overflow-hidden hover:border-[#D4ADFC]/40 hover:-translate-y-1 transition-all duration-200 cursor-pointer group">

          <div class="relative h-40 bg-gradient-to-br from-[#1D267D] to-[#5C469C] flex items-center justify-center">
            <img *ngIf="item.cover_path" [src]="item.cover_path" class="w-full h-full object-cover">
            <span *ngIf="!item.cover_path" class="text-5xl opacity-60">📖</span>
            <div *ngIf="item.lastRead" class="absolute bottom-2 right-2 text-[10px] bg-black/50 px-2 py-0.5 rounded-full">
              {{item.lastRead | date:'dd/MM/yy'}}
            </div>
          </div>

          <div class="p-3">
            <h3 class="text-white font-semibold text-sm mb-1 line-clamp-1">{{item.title}}</h3>
            <p class="text-[#7B6FA0] text-xs mb-2">{{item.pen_name}}</p>
            
            <div class="flex flex-wrap gap-1 mb-2">
              <span *ngFor="let g of item.genres | slice:0:2" 
                    class="text-[9px] bg-[#5C469C]/40 text-[#D4ADFC] px-2 py-0.5 rounded-full">{{getName(g)}}</span>
              <span *ngIf="item.genres && item.genres.length > 2" class="text-[8px] text-[#7B6FA0]">+{{item.genres.length - 2}}</span>
            </div>

            <div class="flex justify-between text-[10px] text-[#7B6FA0]">
              <span *ngIf="selectedTab === 'recent'">📖 ตอนที่ {{item.lastChapter}}</span>
              <span *ngIf="selectedTab === 'follow'">🔔 ติดตามแล้ว</span>
            </div>
          </div>
        </div>
      </div>

      <!-- EMPTY STATE -->
      <div *ngIf="!loading && filteredItems.length === 0" class="col-span-full flex flex-col items-center justify-center py-20 text-center">
        <div class="text-6xl mb-4 opacity-40">📭</div>
        <p class="text-[#7B6FA0] text-sm">ยังไม่มีรายการในหมวดนี้</p>
        <a routerLink="/" class="mt-4 text-sm text-[#D4ADFC] hover:text-[#B085E8] underline transition-colors">ไปเลือกนิยายกัน →</a>
      </div>

    </div>
  </div>

  <footer class="border-t border-[#1D267D] mt-10 py-8 text-center text-[#7B6FA0] text-sm">
    <p>© 2025 NovelHub · Angular + Tailwind CSS</p>
  </footer>

</div>
